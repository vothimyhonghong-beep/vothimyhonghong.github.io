<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài tập đúng sai HKII</title>
<style>
body { font-family: Arial; padding: 20px; }
.question { margin-bottom: 20px; }
.correct { color: green; }
.wrong { color: red; }
button { padding: 10px 20px; font-size: 16px; }
.result-detail { margin-top: 10px; }
</style>
</head>

<body>

<h2>Bài tập đúng / sai (20 câu)</h2>

<form id="quizForm"></form>

<button onclick="checkAnswers()">Nộp bài</button>

<h3 id="result"></h3>
<div id="detail"></div>

<script>

let answers = {
q1a:"true", q1b:"false", q1c:"true", q1d:"false",
q2a:"true", q2b:"false", q2c:"false", q2d:"false",
q3a:"true", q3b:"false", q3c:"false", q3d:"false",
q4a:"true", q4b:"false", q4c:"true", q4d:"true",
q5a:"false", q5b:"false", q5c:"false", q5d:"true",
q6a:"false", q6b:"false", q6c:"false", q6d:"true",
q7a:"true", q7b:"false", q7c:"false", q7d:"false",
q8a:"true", q8b:"true", q8c:"true", q8d:"true",
q9a:"false", q9b:"false", q9c:"true", q9d:"true",
q10a:"false", q10b:"true", q10c:"false", q10d:"true",
q11a:"true", q11b:"false", q11c:"true", q11d:"false",
q12a:"true", q12b:"true", q12c:"true", q12d:"true",
q13a:"false", q13b:"false", q13c:"true", q13d:"true",
q14a:"false", q14b:"true", q14c:"true", q14d:"true",
q15a:"true", q15b:"true", q15c:"false", q15d:"true",
q16a:"true", q16b:"true", q16c:"true", q16d:"true",
q17a:"true", q17b:"false", q17c:"false", q17d:"true",
q18a:"true", q18b:"true", q18c:"false", q18d:"false",
q19a:"true", q19b:"false", q19c:"true", q19d:"true",
q20a:"true", q20b:"true", q20c:"true", q20d:"false"
};

let form = document.getElementById("quizForm");

for(let i=1;i<=20;i++){
let div = document.createElement("div");
div.className="question";
div.innerHTML = "<b>Câu "+i+"</b><br>" +
"A <input type='radio' name='q"+i+"a' value='true'> Đúng " +
"<input type='radio' name='q"+i+"a' value='false'> Sai<br>" +
"B <input type='radio' name='q"+i+"b' value='true'> Đúng " +
"<input type='radio' name='q"+i+"b' value='false'> Sai<br>" +
"C <input type='radio' name='q"+i+"c' value='true'> Đúng " +
"<input type='radio' name='q"+i+"c' value='false'> Sai<br>" +
"D <input type='radio' name='q"+i+"d' value='true'> Đúng " +
"<input type='radio' name='q"+i+"d' value='false'> Sai<br>";
form.appendChild(div);
}

function checkAnswers(){
let score = 0;
let detail = "";

for(let key in answers){
let user = document.querySelector("input[name='"+key+"']:checked");

if(user){
if(user.value === answers[key]){
score++;
detail += "<div class='correct'>"+key+" ✔</div>";
}else{
detail += "<div class='wrong'>"+key+" ✘ (Đáp án: "+answers[key]+")</div>";
}
}else{
detail += "<div class='wrong'>"+key+" (Chưa chọn)</div>";
}
}

document.getElementById("result").innerHTML =
"Điểm: "+score+" / 80";

document.getElementById("detail").innerHTML = detail;
}

</script>

</body>
</html>
